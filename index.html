<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="JKT Marathon">
<title>Jakarta Marathon Tracker</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;500;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0e0f0e;--bg2:#161714;--bg3:#1e1f1c;--bg4:#252622;
  --border:#2e302b;--border2:#3a3d36;
  --txt:#e8e6df;--txt2:#9a9890;--txt3:#6a6864;
  --green:#7EC97B;--green-bg:rgba(126,201,123,.13);
  --orange:#E8863A;--orange-bg:rgba(232,134,58,.13);
  --blue:#6BAADC;--blue-bg:rgba(107,170,220,.13);
  --purple:#A888D8;--purple-bg:rgba(168,136,216,.13);
  --red:#E06060;--red-bg:rgba(224,96,96,.13);
  --gold:#D4A84B;--gold-bg:rgba(212,168,75,.13);
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
html,body{height:100%;overflow-x:hidden}
body{font-family:'Syne',sans-serif;background:var(--bg);color:var(--txt);padding-bottom:calc(68px + var(--safe-bottom))}
header{background:var(--bg2);border-bottom:1px solid var(--border);padding:12px 16px;padding-top:calc(12px + var(--safe-top));display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;gap:10px}
.logo{display:flex;align-items:center;gap:10px}
.logo-mark{width:34px;height:34px;border-radius:8px;background:linear-gradient(135deg,var(--orange),var(--red));display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.logo-name{font-size:14px;font-weight:700;letter-spacing:-.01em}
.logo-sub{font-size:10px;color:var(--txt2);margin-top:1px}
.race-pill{background:var(--red-bg);color:var(--red);border:1px solid rgba(224,96,96,.3);font-size:11px;padding:5px 10px;border-radius:20px;font-weight:600;white-space:nowrap}
.strava-btn{display:flex;align-items:center;gap:5px;background:#FC4C02;color:#fff;border:none;padding:7px 12px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;min-height:36px}
.strava-btn.on{background:var(--bg3);color:var(--green);border:1px solid rgba(126,201,123,.3)}
.main{padding:14px 14px 0}
.stats-strip{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:14px}
.stat{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:12px 13px}
.stat-l{font-size:10px;color:var(--txt2);margin-bottom:5px;letter-spacing:.05em;text-transform:uppercase}
.stat-v{font-size:21px;font-weight:700}
.stat-v.hi{color:var(--orange)}
.stat-sub{font-size:10px;color:var(--txt3);margin-top:2px}
.prog-wrap{background:var(--bg4);border-radius:3px;height:4px;margin-top:6px;overflow:hidden}
.prog-bar{height:4px;border-radius:3px;background:var(--orange);transition:width .6s}
.sec-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;margin-top:4px}
.sec-title{font-size:13px;font-weight:700;letter-spacing:.02em}
.chips{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:12px;scrollbar-width:none}
.chips::-webkit-scrollbar{display:none}
.chip{font-size:11px;font-weight:600;padding:6px 14px;border-radius:20px;border:1px solid var(--border2);background:transparent;color:var(--txt2);white-space:nowrap;cursor:pointer;font-family:inherit;flex-shrink:0;min-height:32px}
.chip.active{background:var(--orange);color:#fff;border-color:var(--orange)}
.legend{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px}
.leg{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--txt2)}
.leg-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0}
.weeks{display:flex;flex-direction:column;gap:6px}
.week-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.week-card.current{border-color:var(--orange)}
.week-card.phase-taper{border-left:3px solid var(--purple)}
.week-card.phase-race{border-left:3px solid var(--red)}
.week-hdr{display:flex;align-items:center;gap:8px;padding:13px 14px;cursor:pointer;user-select:none;min-height:54px}
.w-num{font-size:11px;font-weight:700;color:var(--txt3);width:36px;flex-shrink:0;font-family:'DM Mono',monospace}
.w-focus{font-size:13px;font-weight:600;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.w-tag{font-size:9px;font-weight:700;padding:3px 7px;border-radius:6px;letter-spacing:.05em;text-transform:uppercase;flex-shrink:0}
.tag-build{background:var(--green-bg);color:var(--green)}
.tag-peak{background:var(--orange-bg);color:var(--orange)}
.tag-taper{background:var(--purple-bg);color:var(--purple)}
.tag-race{background:var(--red-bg);color:var(--red)}
.w-meta{font-size:10px;color:var(--txt3);text-align:right;flex-shrink:0;font-family:'DM Mono',monospace;line-height:1.5}
.w-chev{color:var(--txt3);font-size:16px;transition:transform .25s;flex-shrink:0;margin-left:2px}
.w-chev.open{transform:rotate(180deg)}
.w-body{padding:0 12px 12px;display:none}
.w-body.open{display:block}
.days-scroll{display:flex;gap:8px;overflow-x:auto;padding-bottom:6px;scrollbar-width:none}
.days-scroll::-webkit-scrollbar{display:none}
.day-card{background:var(--bg3);border:1.5px solid var(--border);border-radius:10px;padding:10px 9px;min-height:96px;width:92px;flex-shrink:0;display:flex;flex-direction:column;gap:3px;position:relative;user-select:none;cursor:pointer;transition:border-color .15s,opacity .15s}
.day-card:active{opacity:.75}
.day-card.done-card{border-color:rgba(126,201,123,.4)}
.done-tick{position:absolute;top:6px;right:6px;width:15px;height:15px;background:var(--green);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:8px;color:#fff;font-weight:700}
.d-dow{font-size:9px;font-weight:700;color:var(--txt3);text-transform:uppercase;letter-spacing:.07em}
.d-badge{font-size:9px;font-weight:700;padding:2px 5px;border-radius:4px;width:fit-content;letter-spacing:.02em;margin-top:2px}
.b-easy{background:var(--green-bg);color:var(--green)}
.b-interval{background:var(--purple-bg);color:var(--purple)}
.b-long{background:var(--blue-bg);color:var(--blue)}
.b-strength{background:var(--gold-bg);color:var(--gold)}
.b-rest{background:var(--bg4);color:var(--txt3)}
.b-race{background:var(--red-bg);color:var(--red)}
.d-session{font-size:10px;font-weight:600;color:var(--txt);line-height:1.25;margin-top:2px}
.d-km{font-size:14px;font-weight:700;margin-top:auto;padding-top:4px}
.d-km span{font-size:9px;color:var(--txt3);font-weight:400}
.d-pace{font-size:9px;color:var(--txt3);font-family:'DM Mono',monospace}
.d-rest-icon{font-size:20px;margin-top:auto;padding-top:4px}
.vol-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:14px}
.vol-row{display:flex;align-items:center;gap:7px;margin-bottom:4px}
.vol-label{font-size:9px;color:var(--txt3);width:22px;text-align:right;font-family:'DM Mono',monospace;flex-shrink:0}
.vol-track{flex:1;height:13px;background:var(--bg4);border-radius:3px;position:relative;overflow:hidden}
.vol-bar-bg{position:absolute;left:0;top:0;height:100%;border-radius:3px;opacity:.35}
.vol-bar-long{position:absolute;left:0;top:0;height:100%;border-radius:3px}
.vol-km{font-size:9px;color:var(--txt3);width:42px;text-align:right;font-family:'DM Mono',monospace;flex-shrink:0}
.vol-row.curr .vol-label,.vol-row.curr .vol-km{color:var(--orange);font-weight:700}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-top:1px solid var(--border);display:flex;padding:8px 0;padding-bottom:calc(8px + var(--safe-bottom));z-index:100}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;color:var(--txt3);cursor:pointer;font-family:inherit;padding:4px 0;min-height:44px;justify-content:center;transition:color .15s}
.nav-btn.active{color:var(--orange)}
.nav-icon{font-size:20px;line-height:1}
.nav-label{font-size:10px;font-weight:600;letter-spacing:.03em}
.sheet-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:300;display:none;align-items:flex-end}
.sheet-overlay.open{display:flex}
.sheet{background:var(--bg2);border-top:1px solid var(--border2);border-radius:18px 18px 0 0;width:100%;max-height:92vh;overflow-y:auto;padding:0 20px;padding-bottom:calc(24px + var(--safe-bottom));animation:slideUp .28s cubic-bezier(.32,1,.4,1)}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:none}}
.sheet-handle{width:36px;height:4px;background:var(--border2);border-radius:2px;margin:12px auto 16px}
.sheet-title{font-size:17px;font-weight:700;margin-bottom:2px;letter-spacing:-.01em}
.sheet-sub{font-size:12px;color:var(--txt2);margin-bottom:18px}
.sheet-row{display:flex;justify-content:space-between;align-items:flex-start;padding:10px 0;border-bottom:1px solid var(--border);font-size:13px;gap:10px}
.sheet-row:last-of-type{border-bottom:none}
.srow-l{color:var(--txt2);flex-shrink:0}
.srow-r{color:var(--txt);font-weight:600;text-align:right;font-family:'DM Mono',monospace;font-size:12px}
.strength-block{margin-top:14px;padding:12px;background:var(--gold-bg);border-radius:10px;border:1px solid rgba(212,168,75,.25)}
.sb-title{font-size:11px;font-weight:700;color:var(--gold);margin-bottom:8px;letter-spacing:.05em;text-transform:uppercase}
.sb-item{font-size:12px;color:var(--txt2);padding:3px 0;display:flex;align-items:center;gap:7px}
.sb-item::before{content:'';width:4px;height:4px;border-radius:50%;background:var(--gold);flex-shrink:0}
.sheet-actions{display:flex;gap:10px;margin-top:18px}
.btn-done{flex:1;background:var(--green);color:#0e0f0e;border:none;padding:14px;border-radius:12px;font-size:14px;font-weight:700;font-family:inherit;cursor:pointer;min-height:50px}
.btn-done.unmark{background:var(--red);color:#fff}
.btn-close{background:var(--bg3);color:var(--txt2);border:1px solid var(--border2);padding:14px 20px;border-radius:12px;font-size:14px;font-family:inherit;cursor:pointer;min-height:50px}
.editor-section{margin-bottom:20px}
.editor-section-title{font-size:12px;font-weight:700;color:var(--txt2);letter-spacing:.06em;text-transform:uppercase;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.edit-week-row{display:flex;align-items:center;gap:8px;padding:10px 0;border-bottom:1px solid var(--border);cursor:pointer;min-height:44px}
.edit-week-row:last-of-type{border-bottom:none}
.ewr-num{font-size:11px;font-weight:700;color:var(--txt3);width:30px;font-family:'DM Mono',monospace;flex-shrink:0}
.ewr-focus{font-size:13px;flex:1}
.ewr-km{font-size:11px;color:var(--txt3);font-family:'DM Mono',monospace;flex-shrink:0}
.ewr-arrow{color:var(--txt3);font-size:16px;margin-left:4px}
.edit-day-row{display:flex;align-items:flex-start;gap:8px;padding:10px 0;border-bottom:1px solid var(--border)}
.edit-day-row:last-of-type{border-bottom:none}
.edr-dow{font-size:11px;font-weight:700;color:var(--txt3);width:28px;flex-shrink:0;padding-top:3px}
.edr-fields{display:flex;flex-direction:column;gap:5px;flex:1;min-width:0}
.edr-input{background:var(--bg4);border:1px solid var(--border2);border-radius:7px;color:var(--txt);font-family:'Syne',sans-serif;font-size:12px;padding:7px 10px;width:100%;outline:none;-webkit-appearance:none}
.edr-input:focus{border-color:var(--orange)}
.edr-row2{display:flex;gap:6px}
.edr-km{width:62px;background:var(--bg4);border:1px solid var(--border2);border-radius:7px;color:var(--txt);font-family:'DM Mono',monospace;font-size:12px;padding:7px 8px;outline:none;-webkit-appearance:none}
.edr-km:focus{border-color:var(--orange)}
.edr-type{flex:1;background:var(--bg4);border:1px solid var(--border2);border-radius:7px;color:var(--txt2);font-family:'Syne',sans-serif;font-size:12px;padding:7px 8px;outline:none;-webkit-appearance:none}
.edr-type:focus{border-color:var(--orange)}
.save-banner{background:var(--green);color:#0e0f0e;font-weight:700;font-size:14px;padding:14px 16px;border-radius:12px;text-align:center;margin-top:14px;cursor:pointer;min-height:50px;display:flex;align-items:center;justify-content:center;gap:6px}
.import-area{background:var(--bg4);border:1px dashed var(--border2);border-radius:10px;padding:12px;font-family:'DM Mono',monospace;font-size:11px;color:var(--txt2);width:100%;min-height:90px;outline:none;resize:vertical;margin-top:8px;-webkit-appearance:none}
.import-area:focus{border-color:var(--orange)}
.util-btn{width:100%;padding:12px 16px;border-radius:10px;font-size:13px;font-family:inherit;cursor:pointer;margin-bottom:8px;min-height:46px;display:flex;align-items:center;justify-content:center;gap:6px}
.view{display:none}.view.active{display:block}
</style>
</head>
<body>
<header>
  <div class="logo">
    <div class="logo-mark">🏃</div>
    <div>
      <div class="logo-name">JKT Marathon</div>
      <div class="logo-sub">20 weeks · Full 42K · from Jun 7</div>
    </div>
  </div>
  <div style="display:flex;gap:8px;align-items:center">
    <div class="race-pill">🏁 25 Oct 2026</div>
    <button class="strava-btn" id="stravaBtn" onclick="toggleStrava()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M15.387 17.944l-2.089-4.116h-3.065L15.387 24l5.15-10.172h-3.066m-7.008-5.599l2.836 5.598h4.172L10.463 0l-7 13.828h4.169"/></svg>
      Strava
    </button>
  </div>
</header>

<div class="main">
  <div class="view active" id="viewPlan">
    <div class="stats-strip" id="statsStrip"></div>
    <div class="sec-hdr"><span class="sec-title">Training weeks</span></div>
    <div class="chips">
      <button class="chip active" onclick="setFilter('all',this)">All</button>
      <button class="chip" onclick="setFilter('Build',this)">Build</button>
      <button class="chip" onclick="setFilter('Peak',this)">Peak</button>
      <button class="chip" onclick="setFilter('Taper',this)">Taper</button>
      <button class="chip" onclick="setFilter('upcoming',this)">Upcoming</button>
    </div>
    <div class="legend">
      <div class="leg"><div class="leg-dot" style="background:var(--green)"></div>Easy</div>
      <div class="leg"><div class="leg-dot" style="background:var(--purple)"></div>Intervals</div>
      <div class="leg"><div class="leg-dot" style="background:var(--blue)"></div>Long</div>
      <div class="leg"><div class="leg-dot" style="background:var(--gold)"></div>Strength</div>
      <div class="leg"><div class="leg-dot" style="background:var(--txt3)"></div>Rest</div>
      <div class="leg"><div class="leg-dot" style="background:var(--red)"></div>Race</div>
    </div>
    <div class="weeks" id="weeksContainer"></div>
  </div>

  <div class="view" id="viewVolume">
    <div class="sec-hdr" style="margin-top:4px">
      <span class="sec-title">Volume overview</span>
      <span style="font-size:11px;color:var(--txt3)"><span style="color:var(--blue)">■</span> Long &nbsp;<span style="color:var(--orange);opacity:.6">■</span> Total</span>
    </div>
    <div class="vol-card" id="volChart"></div>
  </div>

  <div class="view" id="viewEdit">
    <div class="sec-hdr" style="margin-top:4px"><span class="sec-title">Edit plan</span></div>
    <div id="editContent"></div>
  </div>
</div>

<nav class="bottom-nav">
  <button class="nav-btn active" id="navPlan" onclick="setView('Plan',this)">
    <span class="nav-icon">📋</span><span class="nav-label">Plan</span>
  </button>
  <button class="nav-btn" id="navVolume" onclick="setView('Volume',this)">
    <span class="nav-icon">📊</span><span class="nav-label">Volume</span>
  </button>
  <button class="nav-btn" id="navEdit" onclick="setView('Edit',this)">
    <span class="nav-icon">✏️</span><span class="nav-label">Edit</span>
  </button>
</nav>

<div class="sheet-overlay" id="sheetOverlay" onclick="closeSheet(event)">
  <div class="sheet"><div class="sheet-handle"></div><div id="sheetContent"></div></div>
</div>

<script>

const STRENGTH_B=['Romanian deadlift 3×10','Step-ups 3×12 each','Single-leg squat 3×8','Nordic curl 3×6','Glute bridge 3×15','Plank 3×45s'];

const PLAN_START = new Date('2026-06-07');
const RACE_DATE  = new Date('2026-10-25');
const today = new Date(); today.setHours(0,0,0,0);

let S = {completed:{},open:{},filter:'all',strava:false,plan:null};
try{const s=localStorage.getItem('jmv5');if(s)Object.assign(S,JSON.parse(s))}catch(e){}
function getPlan(){return S.plan||DEFAULT_PLAN}
function save(){try{localStorage.setItem('jmv5',JSON.stringify({completed:S.completed,strava:S.strava,plan:S.plan}))}catch(e){alert('Storage full — clear old data in Edit tab');}}

function addDays(d,n){const r=new Date(d);r.setDate(r.getDate()+n);return r}
function fmtDate(d){return d.toLocaleDateString('en-GB',{day:'numeric',month:'short'})}
function fmtShort(d){return d.toLocaleDateString('en-GB',{day:'numeric',month:'short'})}
// Returns -1 if plan hasn't started yet, 0–19 once underway
function currentWeek(){
  const diff=Math.floor((today-PLAN_START)/(7*86400000));
  if(diff<0)return -1;
  return Math.min(getPlan().length-1,diff);
}

function toggleStrava(){
  S.strava=!S.strava;save();
  const b=document.getElementById('stravaBtn');
  b.className='strava-btn'+(S.strava?' on':'');
  b.innerHTML=S.strava
    ?'<svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M15.387 17.944l-2.089-4.116h-3.065L15.387 24l5.15-10.172h-3.066m-7.008-5.599l2.836 5.598h4.172L10.463 0l-7 13.828h4.169"/></svg> ✓'
    :'<svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M15.387 17.944l-2.089-4.116h-3.065L15.387 24l5.15-10.172h-3.066m-7.008-5.599l2.836 5.598h4.172L10.463 0l-7 13.828h4.169"/></svg> Strava';
}

function setView(v,btn){
  document.querySelectorAll('.view').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('view'+v).classList.add('active');
  btn.classList.add('active');
  if(v==='Volume')renderVolume();
  if(v==='Edit')renderEdit();
}

function setFilter(f,btn){
  S.filter=f;
  document.querySelectorAll('.chip').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderWeeks();
}

function renderStats(){
  const cw=currentWeek();
  const dtr=Math.max(0,Math.floor((RACE_DATE-today)/86400000));
  const wl=Math.max(0,Math.ceil(dtr/7));
  const logged=Object.entries(S.completed).filter(([,v])=>v).reduce((s,[k])=>{
    const[wi,di]=k.split('_').map(Number);
    const plan=getPlan();if(wi>=plan.length)return s;
    return s+(plan[wi].days[di]?.km||0);
  },0);
  const cwp=cw>=0?getPlan()[cw]:null;
  const daysToStart=cw<0?Math.ceil((PLAN_START-today)/86400000):0;
  const weekLabel=cw<0?`<span style="font-size:13px;color:var(--txt3)">starts in ${daysToStart}d</span>`:`W${cw+1}<span style="font-size:13px;color:var(--txt3)">/${getPlan().length}</span>`;
  const progPct=cw<0?0:Math.round((cw+1)/getPlan().length*100);
  document.getElementById('statsStrip').innerHTML=`
    <div class="stat"><div class="stat-l">Days to race</div><div class="stat-v hi">${dtr}</div><div class="stat-sub">${wl} weeks left</div></div>
    <div class="stat"><div class="stat-l">Week</div><div class="stat-v">${weekLabel}</div><div class="prog-wrap"><div class="prog-bar" style="width:${progPct}%"></div></div></div>
    <div class="stat"><div class="stat-l">KM logged</div><div class="stat-v">${Math.round(logged)}</div><div class="stat-sub">cumulative</div></div>
    <div class="stat"><div class="stat-l">This week</div><div class="stat-v">${cwp?cwp.weekKm:'–'}<span style="font-size:11px;color:var(--txt3)"> km</span></div><div class="stat-sub">${cwp?cwp.phase:'Plan starts '+fmtDate(PLAN_START)}</div></div>`;
}

function renderVolume(){
  const cw=currentWeek();const max=75;
  let h='';
  getPlan().forEach((p,wi)=>{
    const lp=Math.round(p.longKm/max*100);
    const tp=Math.round(p.weekKm/max*100);
    const col=p.phase==='Race'?'var(--red)':p.phase==='Taper'?'var(--purple)':p.phase==='Peak'?'var(--orange)':'var(--green)';
    h+=`<div class="vol-row${wi===cw?' curr':''}">
      <div class="vol-label">W${wi+1}</div>
      <div class="vol-track">
        <div class="vol-bar-bg" style="width:${tp}%;background:${col}"></div>
        <div class="vol-bar-long" style="width:${lp}%;background:var(--blue)"></div>
      </div>
      <div class="vol-km">${p.longKm}/${p.weekKm}</div>
    </div>`;
  });
  document.getElementById('volChart').innerHTML=h;
}

function renderWeeks(){
  const cw=currentWeek();const f=S.filter;
  const today2=new Date();today2.setHours(0,0,0,0);
  let html='';
  getPlan().forEach((p,wi)=>{
    const wkStart=addDays(PLAN_START,wi*7);
    const wkEnd=addDays(wkStart,6);
    const isPast=wkEnd<today2;
    const isCurrent=cw>=0&&wi===cw;
    const isOpen=!!S.open[wi];
    const days=p.days;
    const doneCount=days.filter((_,di)=>S.completed[wi+'_'+di]).length;
    const sessionCount=days.filter(d=>d.type!=='rest').length;
    if(f==='Build'&&p.phase!=='Build')return;
    if(f==='Peak'&&p.phase!=='Peak')return;
    if(f==='Taper'&&p.phase!=='Taper'&&p.phase!=='Race')return;
    if(f==='upcoming'&&isPast)return;
    const tagCls=p.phase==='Race'?'tag-race':p.phase==='Taper'?'tag-taper':p.phase==='Peak'?'tag-peak':'tag-build';
    const cardCls=['week-card',isCurrent?'current':'',p.phase==='Taper'||p.phase==='Race'?'phase-taper':''].filter(Boolean).join(' ');
    let bodyHtml='';
    if(isOpen){
      let cards='';
      days.forEach((day,di)=>{
        const done=!!S.completed[wi+'_'+di];
        const badge=day.type==='strength'?'STR':day.type==='interval'?'INT':day.type==='long'?'LONG':day.type==='race'?'RACE':day.type.toUpperCase();
        cards+=`<div class="day-card${done?' done-card':''}" onclick="openModal(${wi},${di})">
          ${done?'<div class="done-tick">✓</div>':''}
          <div class="d-dow">${day.dow}</div>
          <div class="d-badge b-${day.type}">${badge}</div>
          <div class="d-session">${day.session}</div>
          ${day.km>0?`<div class="d-km">${day.km}<span> km</span></div><div class="d-pace">${day.pace}</div>`:'<div class="d-rest-icon">💤</div>'}
        </div>`;
      });
      bodyHtml=`<div class="w-body open"><div class="days-scroll">${cards}</div></div>`;
    }
    html+=`<div class="${cardCls}" id="wk${wi}">
      <div class="week-hdr" onclick="toggleWeek(${wi})">
        <div class="w-num">${isCurrent?'▶ ':''}W${wi+1}</div>
        <div style="display:flex;flex-direction:column;flex:1;min-width:0;gap:2px">
          <div class="w-focus">${p.focus}${isCurrent?' <span style="font-size:9px;padding:2px 6px;background:rgba(232,134,58,.2);color:var(--orange);border-radius:5px;margin-left:5px">NOW</span>':''}</div>
          <div style="font-size:10px;color:var(--txt3);font-family:'DM Mono',monospace">${fmtShort(wkStart)} – ${fmtShort(wkEnd)}</div>
        </div>
        <div class="w-tag ${tagCls}">${p.phase}</div>
        <div class="w-meta">${doneCount}/${sessionCount}<br>${p.weekKm}km</div>
        <div class="w-chev${isOpen?' open':''}">▾</div>
      </div>
      ${bodyHtml}
    </div>`;
  });
  document.getElementById('weeksContainer').innerHTML=html;
}

function toggleWeek(wi){
  S.open[wi]=!S.open[wi];renderWeeks();
  if(S.open[wi])setTimeout(()=>document.getElementById('wk'+wi).scrollIntoView({behavior:'smooth',block:'nearest'}),60);
}

function openModal(wi,di){
  const p=getPlan()[wi];
  const day=p.days[di];
  const key=wi+'_'+di;
  const done=!!S.completed[key];
  const strExs=(wi%2===0)?STRENGTH_A:STRENGTH_B;
  const typeLabel={easy:'Easy Run',interval:'Interval / Tempo',long:'Long Run',strength:'Strength + Easy',rest:'Rest Day',race:'RACE DAY 🏁'};
  let sBlock='';
  if(day.type==='strength'){
    sBlock=`<div class="strength-block"><div class="sb-title">💪 Strength (${wi%2===0?'Set A':'Set B'})</div>${strExs.map(e=>`<div class="sb-item">${e}</div>`).join('')}</div>`;
  }
  document.getElementById('sheetContent').innerHTML=`
    <div class="sheet-title">${day.dow} · Week ${wi+1}</div>
    <div class="sheet-sub">${p.focus} · ${fmtDate(addDays(PLAN_START,wi*7+di))}</div>
    <div class="sheet-row"><span class="srow-l">Session</span><span class="srow-r" style="font-family:'Syne',sans-serif;max-width:200px">${day.session}</span></div>
    <div class="sheet-row"><span class="srow-l">Type</span><span class="srow-r"><span class="d-badge b-${day.type}" style="font-size:10px;padding:3px 8px">${typeLabel[day.type]||day.type}</span></span></div>
    ${day.km?`<div class="sheet-row"><span class="srow-l">Distance</span><span class="srow-r">${day.km} km</span></div>`:''}
    <div class="sheet-row"><span class="srow-l">Pace</span><span class="srow-r">${day.pace}</span></div>
    ${day.notes?`<div class="sheet-row"><span class="srow-l">Notes</span><span class="srow-r" style="font-family:'Syne',sans-serif;font-weight:400;color:var(--txt2);font-size:12px;max-width:210px;text-align:right">${day.notes}</span></div>`:''}
    ${sBlock}
    <div class="sheet-actions">
      <button class="btn-close" onclick="closeSheet()">Close</button>
      <button class="btn-done${done?' unmark':''}" onclick="toggleDone('${key}')">${done?'✕ Unmark':'✓ Mark done'}</button>
    </div>`;
  document.getElementById('sheetOverlay').classList.add('open');
}

function closeSheet(e){
  if(e&&e.target!==document.getElementById('sheetOverlay'))return;
  _editBuf=null;
  document.getElementById('sheetOverlay').classList.remove('open');
}

function toggleDone(key){
  S.completed[key]=!S.completed[key];save();
  closeSheet();renderWeeks();renderStats();
}

// ── EDIT ──
function renderEdit(){
  const plan=getPlan();
  let h=`<div class="editor-section"><div class="editor-section-title">Tap a week to edit sessions</div>`;
  plan.forEach((p,wi)=>{
    h+=`<div class="edit-week-row" onclick="editWeek(${wi})">
      <div class="ewr-num">W${wi+1}</div>
      <div class="ewr-focus">${p.focus}</div>
      <div class="ewr-km">${p.weekKm}km</div>
      <div class="ewr-arrow">›</div>
    </div>`;
  });
  h+=`</div>
  <div class="editor-section">
    <div class="editor-section-title">Import / Export JSON</div>
    <p style="font-size:12px;color:var(--txt2);margin-bottom:10px;line-height:1.5">Export your plan, edit it (e.g. after uploading a new spreadsheet to Claude), then paste back to update.</p>
    <button class="util-btn" style="background:var(--bg4);color:var(--txt2);border:1px solid var(--border2)" onclick="exportPlan()">📤 Export plan as JSON</button>
    <textarea class="import-area" id="importArea" placeholder="Paste updated JSON here…"></textarea>
    <button class="util-btn" style="background:var(--orange);color:#fff;border:none;margin-top:8px" onclick="importPlan()">📥 Import &amp; apply JSON</button>
  </div>
  <div class="editor-section">
    <div class="editor-section-title">Reset</div>
    <button class="util-btn" style="background:var(--bg4);color:var(--red);border:1px solid rgba(224,96,96,.3)" onclick="resetProgress()">Clear all completed sessions</button>
    <button class="util-btn" style="background:var(--bg4);color:var(--txt3);border:1px solid var(--border2)" onclick="resetPlanToDefault()">Restore default plan</button>
  </div>`;
  document.getElementById('editContent').innerHTML=h;
}

let _editBuf=null;
function editWeek(wi){
  _editBuf={wi,data:JSON.parse(JSON.stringify(getPlan()[wi]))};
  const p=_editBuf.data;
  let daysHtml='';
  p.days.forEach((day,di)=>{
    daysHtml+=`<div class="edit-day-row">
      <div class="edr-dow">${day.dow}</div>
      <div class="edr-fields">
        <input class="edr-input" value="${day.session}" onchange="_editBuf.data.days[${di}].session=this.value" />
        <div class="edr-row2">
          <input class="edr-km" type="number" step="0.5" min="0" value="${day.km}" onchange="_editBuf.data.days[${di}].km=parseFloat(this.value)||0" />
          <select class="edr-type" onchange="_editBuf.data.days[${di}].type=this.value">
            ${['easy','interval','long','strength','rest','race'].map(t=>`<option value="${t}"${day.type===t?' selected':''}>${t}</option>`).join('')}
          </select>
        </div>
        <input class="edr-input" value="${day.notes}" placeholder="Notes…" onchange="_editBuf.data.days[${di}].notes=this.value" />
      </div>
    </div>`;
  });
  document.getElementById('sheetContent').innerHTML=`
    <div class="sheet-title">Edit Week ${wi+1}</div>
    <div class="sheet-sub">${p.focus} · ${p.phase} · ${p.weekKm} km</div>
    <div style="margin-bottom:14px">
      <div style="font-size:11px;color:var(--txt2);margin-bottom:5px">Week focus</div>
      <input class="edr-input" value="${p.focus}" onchange="_editBuf.data.focus=this.value" />
    </div>
    <div style="display:flex;gap:10px;margin-bottom:14px">
      <div style="flex:1"><div style="font-size:11px;color:var(--txt2);margin-bottom:5px">Total km</div>
        <input class="edr-km" style="width:100%" type="number" step="1" value="${p.weekKm}" onchange="_editBuf.data.weekKm=parseFloat(this.value)||0" /></div>
      <div style="flex:1"><div style="font-size:11px;color:var(--txt2);margin-bottom:5px">Long run km</div>
        <input class="edr-km" style="width:100%" type="number" step="0.5" value="${p.longKm}" onchange="_editBuf.data.longKm=parseFloat(this.value)||0" /></div>
    </div>
    <div style="font-size:11px;color:var(--txt2);font-weight:700;letter-spacing:.05em;text-transform:uppercase;margin-bottom:8px">Sessions</div>
    ${daysHtml}
    <div class="save-banner" onclick="saveWeekEdit()">✓ Save Week ${wi+1}</div>
    <div style="height:8px"></div>`;
  document.getElementById('sheetOverlay').classList.add('open');
}

function saveWeekEdit(){
  if(!_editBuf)return;
  const plan=JSON.parse(JSON.stringify(getPlan()));
  plan[_editBuf.wi]=_editBuf.data;
  S.plan=plan;_editBuf=null;save();
  closeSheet();renderWeeks();renderStats();renderEdit();
}

function exportPlan(){
  const json=JSON.stringify(getPlan(),null,2);
  const ta=document.getElementById('importArea');
  if(ta)ta.value=json;
  try{navigator.clipboard.writeText(json).then(()=>alert('Copied to clipboard!'));}catch(e){}
}
function importPlan(){
  const raw=(document.getElementById('importArea')||{}).value||'';
  if(!raw.trim()){alert('Paste JSON first');return;}
  try{
    const parsed=JSON.parse(raw);
    if(!Array.isArray(parsed)||!parsed[0]?.days)throw new Error('Invalid plan format');
    S.plan=parsed;save();renderWeeks();renderStats();renderEdit();
    alert('Plan updated!');
  }catch(e){alert('Invalid JSON: '+e.message);}
}
function resetProgress(){if(!confirm('Clear all completed sessions?'))return;S.completed={};save();renderWeeks();renderStats();}
function resetPlanToDefault(){if(!confirm('Restore default plan? Your edits will be lost.'))return;S.plan=null;save();renderWeeks();renderStats();renderEdit();}

(function(){
  if(S.strava)toggleStrava();
  renderStats();
  const cw=currentWeek();
  const openWi=cw>=0?cw:0;
  if(!S.open[openWi])S.open[openWi]=true;
  renderWeeks();
})();
</script>
</body>
</html>
